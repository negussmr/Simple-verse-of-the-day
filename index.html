<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verse of the Day</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Animated Liquid Background -->
  <div class="bg-container">
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>
    <div class="bg-overlay"></div>
  </div>

  <!-- Main Glass Container -->
  <div class="container">

    <!-- Streak Section -->
    <div class="streak-section">
      <div class="streak-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C12 2 8 8 8 12C8 14.2091 9.79086 16 12 16C14.2091 16 16 14.2091 16 12C16 8 12 2 12 2Z" fill="#FF6B35" opacity="0.8"/>
          <path d="M12 16C9.79086 16 8 17.7909 8 20H16C16 17.7909 14.2091 16 12 16Z" fill="#FF4500" opacity="0.6"/>
          <circle cx="12" cy="12" r="2" fill="#FFD700" opacity="0.9"/>
        </svg>
      </div>
      <div class="streak-number" id="streakCount">0</div>
      <div class="streak-label">DAY STREAK</div>
      <div class="streak-status" id="streakStatus">Begin your journey</div>
    </div>

    <!-- Verse Card -->
    <div class="verse-card">
      <div class="verse-label">VERSE OF THE DAY</div>
      <div class="verse-text" id="verseText">Loading...</div>
      <div class="verse-ref" id="verseRef">—</div>
    </div>

    <!-- Made by Seth -->
    <div class="credit">Made by Seth</div>

    <!-- Footer -->
    <div class="footer">
      <div class="date-display" id="dateDisplay"></div>
      <button class="share-btn" id="shareBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
          <polyline points="16 6 12 2 8 6"/>
          <line x1="12" y1="2" x2="12" y2="15"/>
        </svg>
        Share
      </button>
    </div>

  </div>

  <!-- Celebration Particles -->
  <div class="celebration" id="celebration"></div>

  <script src="script.js"></script>
</body>
</html>
